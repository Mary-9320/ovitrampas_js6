                                                    <td className="p-2 sm:p-3 text-center font-bold text-rose-400 align-middle">{sector.positivas}</td>
                                                    <td className="p-2 sm:p-3 text-center font-bold text-orange-400 hidden sm:table-cell align-middle">{sector.huevos}</td>
                                                    <td className="p-2 sm:p-3 text-center font-bold text-amber-400 bg-amber-900/10 align-middle">{sector.phmr}</td>
                                                    <td className="p-2 sm:p-3 text-center align-middle">
                                                        <span className={`px-1.5 sm:px-2 py-0.5 sm:py-1 rounded text-[8px] sm:text-[10px] font-bold uppercase ${sector.riesgoNivel === 'Crítico' ? 'bg-rose-500/20 text-rose-400' : sector.riesgoNivel === 'Alto' ? 'bg-orange-500/20 text-orange-400' : 'bg-cyan-500/20 text-cyan-400'}`}>{sector.riesgoNivel}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>

                        {!isFullscreen && (
                            <div className="w-full xl:w-96 flex flex-col gap-4 shrink-0">
                            {selectedHotspot && mapViewMode === 'puntos' ? (
                                <div className="bg-slate-900 p-4 sm:p-6 rounded-2xl border border-cyan-500/30 shadow-[0_0_30px_rgba(6,182,212,0.1)] animate-fade-in">
                                <div className="flex items-start justify-between mb-3 sm:mb-4">
                                    <h3 className="text-lg sm:text-xl font-bold text-white break-words">{selectedHotspot.id}</h3>
                                    <span className={`px-2 sm:px-3 py-1 rounded-full text-[10px] sm:text-xs font-black uppercase shrink-0 ${selectedHotspot.sectorRiesgo === 'Crítico' ? 'bg-rose-500/20 text-rose-400 border border-rose-500/50' : selectedHotspot.sectorRiesgo === 'Alto' ? 'bg-orange-500/20 text-orange-400 border border-orange-500/50' : 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/50'}`}>
                                    Riesgo: {selectedHotspot.sectorRiesgo}
                                    </span>
                                </div>
                                <p className="text-slate-400 text-xs sm:text-sm mb-4 sm:mb-6 flex items-center gap-2"><i className="fa-solid fa-location-dot"></i> S:{selectedHotspot.sector} | M:{selectedHotspot.manzana} {selectedHotspot.hectareas ? `| Ha: ${selectedHotspot.hectareas}` : ''}</p>
                                <div className="grid grid-cols-2 gap-3 sm:gap-4 mb-4 sm:mb-6">
                                    <StatBox label="Huevos Trampa" value={selectedHotspot.huevos} />
                                    <StatBox label="PHMR Sectorial" value={selectedHotspot.sectorPhmr} isAlert={selectedHotspot.sectorRiesgo === 'Crítico'} />
                                </div>
                                </div>
                            ) : (
                                <div className="bg-slate-900/50 p-4 sm:p-6 rounded-2xl border border-slate-800 h-[250px] sm:h-[380px] flex flex-col items-center justify-center text-center text-slate-500 border-dashed">
                                <i className="fa-solid fa-map-location-dot text-[32px] sm:text-[48px] mb-3 sm:mb-4 opacity-30"></i>
                                <p className="px-2 sm:px-4 text-xs sm:text-sm">{mapViewMode === 'puntos' ? 'Selecciona una ovitrampa en el mapa satelital para ver la táctica recomendada.' : 'La tabla muestra la densidad de huevos consolidada por Sector.'}</p>
                                </div>
                            )}
                            </div>
                        )}
                        </div>
                    )}
                    </div>
                </main>
                </div>
            );
        }

        // --- SUBCOMPONENTES UI REUTILIZABLES ---
        function NavButton({ icon, label, active, onClick, disabled }) {
            return (
                <button onClick={disabled ? null : onClick} className={`flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl transition-all duration-300 relative shrink-0 ${disabled ? 'opacity-30 cursor-not-allowed text-slate-600' : active ? 'text-cyan-400 bg-slate-800 border border-slate-700 shadow-md' : 'text-slate-400 hover:text-cyan-300 hover:bg-slate-800/50 border border-transparent'}`}>
                    <div className={`${active ? 'drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]' : ''}`}>{icon}</div>
                    <span className="text-xs sm:text-sm font-semibold whitespace-nowrap">{label}</span>
                </button>
            );
        }

        function StatBox({ label, value, isAlert }) {
            return (
                <div className={`p-2 sm:p-3 rounded-xl border ${isAlert ? 'bg-rose-500/10 border-rose-500/30' : 'bg-slate-800/50 border-slate-700'}`}>
                <p className="text-[10px] sm:text-xs text-slate-400 mb-0.5 sm:mb-1 font-medium uppercase tracking-wider">{label}</p><p className={`text-lg sm:text-xl font-black truncate ${isAlert ? 'text-rose-400' : 'text-white'}`}>{value}</p>
                </div>
            );
        }

        function IndicatorCard({ title, name, value, formula, explanation, colorTheme }) {
            const themes = { rose: 'bg-rose-500/10 border-rose-500/30 text-rose-400 from-rose-900/40', orange: 'bg-orange-500/10 border-orange-500/30 text-orange-400 from-orange-900/40', amber: 'bg-amber-500/10 border-amber-500/30 text-amber-400 from-amber-900/40', emerald: 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400 from-emerald-900/40', cyan: 'bg-cyan-500/10 border-cyan-500/30 text-cyan-400 from-cyan-900/40' };
            const themeClass = themes[colorTheme] || themes.cyan;
            return (
                <div className={`bg-slate-900 border rounded-2xl p-4 sm:p-6 relative overflow-hidden group hover:bg-gradient-to-br ${themeClass} transition-all duration-300`}>
                <div className="flex justify-between items-start mb-3 sm:mb-4 gap-2">
                    <div><h3 className="text-xl sm:text-2xl font-black text-white">{title}</h3><p className="text-[9px] sm:text-[10px] font-bold uppercase tracking-wider opacity-70 mt-1 leading-tight">{name}</p></div>
                    <div className="text-2xl sm:text-3xl font-black drop-shadow-md shrink-0">{value}</div>
                </div>
                <div className="mb-0 bg-slate-950/50 p-2 sm:p-3 rounded-lg border border-slate-800 flex items-start sm:items-center gap-2 sm:gap-3">
                    <i className="fa-solid fa-calculator opacity-50 shrink-0 text-[14px] sm:text-[18px] mt-0.5 sm:mt-0"></i><span className="text-[9px] sm:text-[10px] font-mono text-slate-300 break-words leading-tight">{formula}</span>
                </div>
                </div>
            );
        }

        function TacticalCard({ title, priority, target, icon, colorTheme, action, onClick }) {
            const themes = { 
                rose: { bgIcon: 'bg-rose-500/20 text-rose-400', badge: 'bg-rose-500/20 text-rose-400 border-rose-500/30', glow: 'bg-rose-500/10', btnHover: 'hover:bg-rose-600 hover:border-rose-500' }, 
                orange: { bgIcon: 'bg-orange-500/20 text-orange-400', badge: 'bg-orange-500/20 text-orange-400 border-orange-500/30', glow: 'bg-orange-500/10', btnHover: 'hover:bg-orange-600 hover:border-orange-500' }, 
                cyan: { bgIcon: 'bg-cyan-500/20 text-cyan-400', badge: 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30', glow: 'bg-cyan-500/10', btnHover: 'hover:bg-cyan-600 hover:border-cyan-500' }
            };
            const theme = themes[colorTheme] || themes.cyan;
            return (
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 sm:p-6 relative overflow-hidden group hover:border-slate-700 transition-all">
                <div className={`absolute -top-10 -right-10 w-24 h-24 sm:w-32 sm:h-32 blur-3xl rounded-full transition-all ${theme.glow}`}></div>
                <div className="flex justify-between items-start mb-4 sm:mb-6 relative z-10"><div className={`p-2 sm:p-3 rounded-xl border border-transparent ${theme.bgIcon}`}>{icon}</div><span className={`px-2 py-1 rounded border text-[9px] sm:text-[10px] font-black uppercase tracking-wider ${theme.badge} max-w-[50%] text-right leading-tight`}>{priority}</span></div>
                <div className="relative z-10"><h3 className="text-base sm:text-lg font-bold text-white mb-2">{title}</h3><p className="text-xs sm:text-sm text-slate-400 mb-4 sm:mb-6 flex items-center gap-2 font-medium"><i className="fa-solid fa-crosshairs text-[14px] sm:text-[16px]"></i> {target}</p><button onClick={onClick} className={`w-full py-2.5 sm:py-3 rounded-xl text-white font-bold transition-all shadow-lg text-xs sm:text-sm bg-slate-800 border border-slate-700 ${theme.btnHover}`}>{action}</button></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        // Envolvemos el sistema completo con el escudo anti-colapsos
        root.render(
            <ErrorBoundary>
                <CentroInteligenciaVectorial />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
